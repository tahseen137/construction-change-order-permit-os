databases:
  - name: construction-change-order-permit-os-db
    plan: basic_256mb
    databaseName: constructionops
    user: constructionops

services:
  - type: web
    name: construction-change-order-permit-os
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: construction-change-order-permit-os-db
          property: connectionString
      - key: BOOTSTRAP_WORKSPACE_NAME
        value: Demo GC Workspace
      - key: BOOTSTRAP_ADMIN_USERNAME
        value: admin
      - key: BOOTSTRAP_ADMIN_EMAIL
        value: admin@example.com
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: TRUSTED_HOSTS
        value: "*.onrender.com,localhost,127.0.0.1"
      - key: ENFORCE_HTTPS
        value: "true"
      - key: AUTO_CREATE_SCHEMA
        value: "false"
      - key: RUN_DB_MIGRATIONS
        value: "true"
      - key: STORAGE_BACKEND
        value: local
      - key: POSTMARK_SERVER_TOKEN
        sync: false
      - key: POSTMARK_FROM_EMAIL
        value: no-reply@example.com
      - key: SENTRY_DSN
        sync: false
      - key: POSTHOG_API_KEY
        sync: false
